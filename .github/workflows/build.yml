name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
        sudo xcode-select -s "/Applications/$XCODE_APP"
        xcodebuild -version

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 1 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" KyoNoIjin/Info.plist || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUM" KyoNoIjin/Info.plist

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project KyoNoIjin.xcodeproj -scheme KyoNoIjin

    - name: Import Distribution Certificate
      env:
        CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        echo "$CERT_BASE64" | base64 -D > cert.p12
        security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        rm cert.p12

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project KyoNoIjin.xcodeproj \
          -scheme KyoNoIjin \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/KyoNoIjin.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Upload to App Store Connect
      run: |
        cat > upload_options.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>83VGKGSQUH</string>
          <key>uploadSymbols</key>
          <false/>
          <key>destination</key>
          <string>upload</string>
        </dict>
        </plist>
        EOF
        xcodebuild -exportArchive \
          -archivePath build/KyoNoIjin.xcarchive \
          -exportPath build/upload \
          -exportOptionsPlist upload_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Install ASC API tools
      run: pip3 install --break-system-packages PyJWT requests

    - name: Submit for Review
      continue-on-error: true
      env:
        ASC_KEY_ID: WDXGY9WX55
        ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        APP_VERSION: "1.0"
        BUILD_NUMBER: ${{ env.BUILD_NUM }}
      run: python3 scripts/submit.py
